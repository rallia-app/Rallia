name: Staging Supabase Sync

on:
  pull_request:
    types: [closed]
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: staging-sync
  cancel-in-progress: false

jobs:
  staging-sync:
    name: Sync to Staging
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
        run: |
          npx supabase link --project-ref ${{ vars.SUPABASE_STAGING_PROJECT_REF }}
          npx supabase db push

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_STAGING_ACCESS_TOKEN }}
        run: npx supabase functions deploy

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg run_url "$RUN_URL" \
            --arg sha "$SHORT_SHA" \
            --arg timestamp "$TIMESTAMP" \
            '{embeds: [{
              title: "Staging Sync Failed",
              color: 15158332,
              fields: [
                {name: "Commit", value: ("`" + $sha + "`"), inline: true},
                {name: "Workflow", value: ("[View Logs](" + $run_url + ")"), inline: true}
              ],
              timestamp: $timestamp,
              footer: {text: "Rallia Staging Sync"}
            }]}')

          curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
